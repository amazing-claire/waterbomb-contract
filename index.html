<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterbomb 2026 — 계약서 자동화</title>
<script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
<script src="https://unpkg.com/docxtemplater@3.49.0/build/docxtemplater.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --border: #e0e0da; --border-focus: #aaa;
    --text: #1a1a1a; --text-muted: #888; --text-hint: #bbb;
    --blue-bg: #eef4ff; --blue-text: #2d5fd4; --blue-border: #b3caf5;
    --amber-bg: #fff8eb; --amber-text: #b06a00; --amber-border: #f5d48a;
    --green-bg: #edfaf3; --green-text: #1a7a45; --green-border: #a3dfc0;
    --red-bg: #fff0f0; --red-text: #c0392b; --red-border: #f5b0b0;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .section { margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .tpl-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .tpl-row + .tpl-row { border-top: 1px solid var(--border); }
  .tpl-left { display: flex; align-items: center; gap: 8px; }
  .city-pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; border: 1px solid; }
  .pill-seoul { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
  .pill-busan { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .tpl-name { font-size: 13px; color: var(--text-muted); }
  .tpl-name.set { color: var(--green-text); font-weight: 500; }
  .tpl-row input[type=file] { display: none; }
  .btn { font-size: 12px; font-weight: 500; padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-size: 14px; padding: 10px 24px; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .tpl-hint { font-size: 11px; color: var(--text-hint); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .artist-list { display: flex; flex-direction: column; gap: 10px; }
  .add-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .add-row input, .add-row select { font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
  .add-row input:focus, .add-row select:focus { outline: none; border-color: var(--border-focus); }
  .inp-name { width: 120px; } .inp-date { width: 120px; } .inp-fee { width: 140px; } .inp-city { width: 90px; }
  .artist-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .ac-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue-bg); color: var(--blue-text); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .ac-info { flex: 1; }
  .ac-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .ac-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .del-btn { font-size: 12px; color: var(--text-hint); background: none; border: none; cursor: pointer; padding: 4px; }
  .del-btn:hover { color: var(--red-text); }
  .file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .fslot input[type=file] { display: none; }
  .fslot label { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 7px 10px; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; transition: all 0.15s; overflow: hidden; white-space: nowrap; }
  .fslot label:hover { border-color: var(--border-focus); color: var(--text); }
  .fslot label.ok { border-style: solid; color: var(--green-text); border-color: var(--green-border); background: var(--green-bg); }
  .bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; }
  .today-hint { font-size: 12px; color: var(--text-hint); }
  .status-box { margin-top: 1rem; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
  .status-box.info { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); display: block; }
  .status-box.success { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); display: block; }
  .status-box.error { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); display: block; }
  .prog-list { margin-top: 12px; display: none; flex-direction: column; gap: 6px; }
  .prog-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); padding: 2px 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .prog-item.active { color: var(--blue-text); }
  .prog-item.active .dot { background: var(--blue-text); animation: pulse 1s infinite; }
  .prog-item.done { color: var(--text); }
  .prog-item.done .dot { background: var(--green-text); }
  .prog-item.error { color: var(--red-text); }
  .prog-item.error .dot { background: var(--red-text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .empty { text-align: center; padding: 2rem; color: var(--text-hint); font-size: 13px; border: 1px dashed var(--border); border-radius: var(--radius-sm); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚡ Waterbomb 2026 계약서 자동화</h1>
    <p>아티스트 정보와 서류를 입력하면 계약서 docx를 자동으로 완성해드립니다</p>
  </header>

  <div class="section">
    <div class="section-label">도시별 계약서 초안</div>
    <div class="card">
      <div class="tpl-row">
        <div class="tpl-left">
          <span class="city-pill pill-seoul">서울</span>
          <span class="tpl-name" id="seoul-name">초안 미업로드</span>
        </div>
        <div>
          <input type="file" id="seoul-tpl" accept=".docx" onchange="handleTpl('서울', this)">
          <label for="seoul-tpl" class="btn">파일 선택</label>
        </div>
      </div>
      <div class="tpl-row">
        <div class="tpl-left">
          <span class="city-pill pill-busan">부산</span>
          <span class="tpl-name" id="busan-name">초안 미업로드</span>
        </div>
        <div>
          <input type="file" id="busan-tpl" accept=".docx" onchange="handleTpl('부산', this)">
          <label for="busan-tpl" class="btn">파일 선택</label>
        </div>
      </div>
      <div class="tpl-hint">💡 초안은 브라우저를 닫기 전까지 유지됩니다. 한 번만 업로드하세요.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">아티스트 목록</div>
    <div class="card">
      <div class="artist-list" id="artist-list">
        <div class="empty" id="empty-state">아래에서 아티스트를 추가해주세요</div>
      </div>
      <div class="add-row">
        <input class="inp-name" type="text" id="inp-name" placeholder="아티스트명" />
        <input class="inp-date" type="text" id="inp-date" placeholder="출연일정 (예: 7/24(금))" />
        <input class="inp-fee" type="text" id="inp-fee" placeholder="개런티 (예: 30000000)" />
        <select class="inp-city" id="inp-city">
          <option value="서울">서울</option>
          <option value="부산">부산</option>
        </select>
        <button class="btn" onclick="addArtist()">+ 추가</button>
      </div>
    </div>
  </div>

  <div class="bottom">
    <span class="today-hint">계약일: <span id="today-str"></span> 자동입력</span>
    <button class="btn btn-primary" id="gen-btn" onclick="generate()" disabled>계약서 일괄 생성</button>
  </div>
  <div class="status-box" id="status-box"></div>
  <div class="prog-list" id="prog-list"></div>
</div>

<script>
const state = { artists: [], templates: { '서울': null, '부산': null } };
let artistId = 0;
const t = new Date();
document.getElementById('today-str').textContent = `${t.getFullYear()}년 ${t.getMonth()+1}월 ${t.getDate()}일`;

function handleTpl(city, input) {
  if (!input.files[0]) return;
  state.templates[city] = input.files[0];
  const el = document.getElementById(city === '서울' ? 'seoul-name' : 'busan-name');
  el.textContent = input.files[0].name;
  el.classList.add('set');
  checkReady();
}

function addArtist() {
  const name = document.getElementById('inp-name').value.trim();
  const date = document.getElementById('inp-date').value.trim();
  const fee = document.getElementById('inp-fee').value.trim();
  const city = document.getElementById('inp-city').value;
  if (!name || !date || !fee) { alert('아티스트명, 출연일정, 개런티를 모두 입력해주세요'); return; }
  state.artists.push({ id: artistId++, name, date, fee, city, bizFile: null, bankFile: null });
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-date').value = '';
  document.getElementById('inp-fee').value = '';
  renderArtists();
  checkReady();
}

function removeArtist(id) {
  state.artists = state.artists.filter(a => a.id !== id);
  renderArtists();
  checkReady();
}

function handleFile(id, type, input) {
  if (!input.files[0]) return;
  const a = state.artists.find(x => x.id === id);
  const f = input.files[0];
  const short = f.name.length > 16 ? f.name.slice(0,14)+'…' : f.name;
  if (type === 'biz') {
    a.bizFile = f;
    document.getElementById(`biz-lbl-${id}`).classList.add('ok');
    document.getElementById(`biz-lbl-${id}`).querySelector('span').textContent = short;
  } else {
    a.bankFile = f;
    document.getElementById(`bank-lbl-${id}`).classList.add('ok');
    document.getElementById(`bank-lbl-${id}`).querySelector('span').textContent = short;
  }
  checkReady();
}

function renderArtists() {
  const list = document.getElementById('artist-list');
  document.getElementById('empty-state').style.display = state.artists.length ? 'none' : 'block';
  list.querySelectorAll('.artist-card').forEach(c => c.remove());
  state.artists.forEach(a => {
    const feeNum = Number(String(a.fee).replace(/[^0-9]/g,''));
    const feeStr = feeNum ? feeNum.toLocaleString()+'원' : a.fee;
    const pillClass = a.city === '서울' ? 'pill-seoul' : 'pill-busan';
    const div = document.createElement('div');
    div.className = 'artist-card';
    div.innerHTML = `
      <div class="ac-head">
        <div class="avatar">${a.name.slice(0,2)}</div>
        <div class="ac-info">
          <div class="ac-name">${a.name} <span class="city-pill ${pillClass}">${a.city}</span></div>
          <div class="ac-meta">${a.date} · ${feeStr}</div>
        </div>
        <button class="del-btn" onclick="removeArtist(${a.id})">✕</button>
      </div>
      <div class="file-grid">
        <div class="fslot">
          <input type="file" id="biz-${a.id}" accept="image/*,.pdf" onchange="handleFile(${a.id},'biz',this)">
          <label for="biz-${a.id}" id="biz-lbl-${a.id}">📄 <span>사업자등록증</span></label>
        </div>
        <div class="fslot">
          <input type="file" id="bank-${a.id}" accept="image/*,.pdf" onchange="handleFile(${a.id},'bank',this)">
          <label for="bank-${a.id}" id="bank-lbl-${a.id}">💳 <span>통장사본</span></label>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

function checkReady() {
  const citiesUsed = [...new Set(state.artists.map(a => a.city))];
  const tplOk = citiesUsed.every(c => state.templates[c]);
  const filesOk = state.artists.length > 0 && state.artists.every(a => a.bizFile && a.bankFile);
  document.getElementById('gen-btn').disabled = !(tplOk && filesOk);
}

function showStatus(msg, type) {
  const el = document.getElementById('status-box');
  el.className = `status-box ${type}`;
  el.textContent = msg;
}

function setProgStatus(id, status, label) {
  const el = document.getElementById(`prog-${id}`);
  if (el) { el.className = `prog-item ${status}`; el.querySelector('span').textContent = label; }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function resizeAndBase64(file) {
  return new Promise(function(res, rej) {
    if (file.type === 'application/pdf') { toBase64(file).then(res).catch(rej); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var scale = Math.min(1, 1200 / Math.max(img.width, img.height));
        var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL('image/jpeg', 0.88).split(',')[1]);
      };
      img.onerror = rej;
      img.src = e.target.result;
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function toArrayBuffer(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

function formatMoney(n) { return n.toLocaleString('ko-KR'); }
function toKoreanWan(n) { return `${Math.round(n / 10000)}만`; }

async function fillAndDownload(a, info) {
  const tplFile = state.templates[a.city];
  const zip = new PizZip(await toArrayBuffer(tplFile));
  const feeNum = Number(String(a.fee).replace(/[^0-9]/g,''));
  const xmlPath = 'word/document.xml';
  let xml = zip.files[xmlPath].asText();

  if (a.city === '서울') {
    xml = xml.replace(/(이하 &#x2018;메이드온&#x2019;이라 한다)과 &#x2018;OOO&#x2019;(이하 &#x2018;퍼포머&#x2019;라 한다)/, `$1과 '${info.companyName}'(이하 '퍼포머'라 한다)`);
    xml = xml.replace('일금 00,000,000원 (일금', `일금 ${formatMoney(feeNum)}원 (일금`);
    xml = xml.replace(/>000</g, `>${toKoreanWan(feeNum)}<`);
    xml = xml.replace(/>00,000원 <\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>\(일금 원\))/, `>${formatMoney(feeNum)}원 </w:t>$1`);
    xml = xml.replace('은행명 : ', `은행명 : ${info.bankName} `);
    xml = xml.replace('예금주:', `예금주: ${info.accountHolder}`);
    xml = xml.replace('계좌번호 :', `계좌번호 : ${info.accountNumber}`);
    xml = xml.replace(/>202<\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>)5<\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>)년   월   일</, `>${t.getFullYear()}</w:t>$1</w:t>$2년 ${t.getMonth()+1}월 ${t.getDate()}일<`);
    xml = xml.replace('이름 : ', `이름 : ${a.name}`);
    xml = xml.replace(/>주소<\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>): <\/w:t>(\s*<\/w:r>[\s\S]*?)사업자등록번호:<\/w:t>/, `>주소</w:t>$1>: ${info.address}</w:t>$2사업자등록번호: ${info.bizNumber}</w:t>`);
    xml = xml.replace(/>성명<\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>):<\/w:t>/, `>성명</w:t>$1>: ${info.ceoName}</w:t>`);
  } else {
    xml = xml.replace('소속사', info.companyName);
    xml = xml.replace("&#x2019;OOO&#x2019;", `'${a.name}'`);
    xml = xml.replace('출연 아티스트：OOO', `출연 아티스트：${a.name}`);
    xml = xml.replace(/0000만원 \( ₩\s*<\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>)\s*0000<\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>)\s*원\//, `${toKoreanWan(feeNum)}만원 ( ₩ </w:t>$1${formatMoney(feeNum)}</w:t>$2원/`);
    xml = xml.replace('은행명 : ', `은행명 : ${info.bankName} `);
    xml = xml.replace('예금주:', `예금주: ${info.accountHolder}`);
    xml = xml.replace('계좌번호 :', `계좌번호 : ${info.accountNumber}`);
    xml = xml.replace(/월   일<\/w:t>/, `월 ${t.getDate()}일</w:t>`);
    if (xml.includes('>서울특별시 </w:t>')) xml = xml.replace('>서울특별시 </w:t>', `>${info.address}</w:t>`);
    xml = xml.replace(/>사업자등록번호: <\/w:t>(\s*<\/w:r>\s*<w:r[^>]*>\s*<w:t[^>]*>)대표이사</, `>사업자등록번호: ${info.bizNumber}</w:t>$1>대표이사<`);
  }

  zip.file(xmlPath, xml);
  const out = zip.generate({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const url = URL.createObjectURL(out);
  const link = document.createElement('a');
  link.href = url;
  link.download = `워터밤_${a.city}_2026_계약서_${a.name}.docx`;
  link.click();
  URL.revokeObjectURL(url);
}

async function generate() {
  document.getElementById('gen-btn').disabled = true;
  showStatus('계약서 생성 시작...', 'info');
  const pl = document.getElementById('prog-list');
  pl.style.display = 'flex';
  pl.innerHTML = state.artists.map(a =>
    `<div class="prog-item waiting" id="prog-${a.id}"><div class="dot"></div><span>${a.name} (${a.city}) — 대기 중</span></div>`
  ).join('');

  let ok = 0;
  for (const a of state.artists) {
    setProgStatus(a.id, 'active', `${a.name} — OCR 분석 중...`);
    try {
      const bizB64 = await resizeAndBase64(a.bizFile);
      const bankB64 = await resizeAndBase64(a.bankFile);
      const bizMime = a.bizFile.type === 'application/pdf' ? 'application/pdf' : 'image/jpeg';
      const bankMime = a.bankFile.type === 'application/pdf' ? 'application/pdf' : 'image/jpeg';

      const res = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bizImage: bizB64, bizMime, bankImage: bankB64, bankMime })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `서버 오류 ${res.status}`);
      }

      const info = await res.json();
      setProgStatus(a.id, 'active', `${a.name} — 계약서 생성 중...`);
      await fillAndDownload(a, info);
      setProgStatus(a.id, 'done', `${a.name} ✓ 완료 — 다운로드됨`);
      ok++;
    } catch(err) {
      setProgStatus(a.id, 'error', `${a.name} — 오류: ${err.message}`);
    }
  }

  showStatus(
    ok === state.artists.length
      ? `✓ ${ok}명 계약서 생성 완료! 파일이 다운로드되었습니다.`
      : `${ok}/${state.artists.length}명 완료. 오류 항목을 확인해주세요.`,
    ok === state.artists.length ? 'success' : 'error'
  );
  document.getElementById('gen-btn').disabled = false;
}
